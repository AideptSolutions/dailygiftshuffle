<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#6B46C1"/>
  <!-- Paintbrush handle -->
  <rect x="188" y="95" width="24" height="175" rx="8" fill="white"/>
  <!-- Ferrule (metal band) -->
  <rect x="183" y="255" width="34" height="22" rx="4" fill="white" opacity="0.7"/>
  <!-- Bristle body (tapered) -->
  <path d="M183 274 Q183 310 200 330 Q217 310 217 274 Z" fill="white"/>
  <!-- Bristle tip -->
  <ellipse cx="200" cy="330" rx="10" ry="6" fill="white"/>
  <!-- Paint dab on bristle tip -->
  <circle cx="200" cy="328" r="12" fill="#6B46C1" opacity="0.3"/>
  <!-- Color palette (circle with paint spots) -->
  <ellipse cx="200" cy="170" rx="50" ry="35" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
</svg>
