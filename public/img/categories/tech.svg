<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#2D3748"/>
  <!-- Monitor screen outer -->
  <rect x="80" y="100" width="240" height="160" rx="12" fill="white"/>
  <!-- Monitor screen inner (display) -->
  <rect x="95" y="115" width="210" height="130" rx="6" fill="#2D3748"/>
  <!-- Screen glow lines -->
  <rect x="110" y="135" width="140" height="8" rx="4" fill="white" opacity="0.6"/>
  <rect x="110" y="153" width="100" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="110" y="171" width="120" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="110" y="189" width="80" height="8" rx="4" fill="white" opacity="0.3"/>
  <!-- Monitor stand neck -->
  <rect x="185" y="260" width="30" height="35" rx="4" fill="white"/>
  <!-- Monitor stand base -->
  <rect x="145" y="290" width="110" height="16" rx="8" fill="white"/>
</svg>
