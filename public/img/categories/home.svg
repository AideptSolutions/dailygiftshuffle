<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#975A16"/>
  <!-- Roof -->
  <polygon points="200,90 320,195 80,195" fill="white"/>
  <!-- Chimney -->
  <rect x="250" y="105" width="28" height="55" rx="3" fill="white"/>
  <!-- House body -->
  <rect x="100" y="190" width="200" height="140" rx="5" fill="white"/>
  <!-- Door -->
  <rect x="170" y="250" width="60" height="80" rx="6" fill="#975A16"/>
  <!-- Door knob -->
  <circle cx="222" cy="294" r="5" fill="white"/>
  <!-- Left window -->
  <rect x="115" y="215" width="50" height="45" rx="5" fill="#975A16"/>
  <line x1="140" y1="215" x2="140" y2="260" stroke="white" stroke-width="4"/>
  <line x1="115" y1="237" x2="165" y2="237" stroke="white" stroke-width="4"/>
  <!-- Right window -->
  <rect x="235" y="215" width="50" height="45" rx="5" fill="#975A16"/>
  <line x1="260" y1="215" x2="260" y2="260" stroke="white" stroke-width="4"/>
  <line x1="235" y1="237" x2="285" y2="237" stroke="white" stroke-width="4"/>
</svg>
