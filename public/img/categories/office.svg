<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#2D3748"/>
  <!-- Briefcase body -->
  <rect x="90" y="185" width="220" height="155" rx="14" fill="white"/>
  <!-- Briefcase handle -->
  <path d="M160 185 L160 162 Q160 142 200 142 Q240 142 240 162 L240 185" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center latch bar -->
  <rect x="90" y="252" width="220" height="14" rx="4" fill="#2D3748" opacity="0.2"/>
  <!-- Latch clasp center -->
  <rect x="178" y="244" width="44" height="30" rx="6" fill="#2D3748" opacity="0.3"/>
  <!-- Latch button -->
  <rect x="188" y="252" width="24" height="14" rx="4" fill="white" opacity="0.6"/>
  <!-- Left pocket line -->
  <line x1="135" y1="215" x1="135" y2="310" x2="135" y2="310" stroke="#2D3748" stroke-width="2" opacity="0.15"/>
  <!-- Right pocket line -->
  <line x1="265" y1="215" x2="265" y2="310" stroke="#2D3748" stroke-width="2" opacity="0.15"/>
</svg>
